# حراج ستيشن — Nginx reverse proxy
#
# Install:
#   sudo cp deploy/nginx/harajstation.conf /etc/nginx/sites-available/harajstation
#   sudo ln -sf /etc/nginx/sites-available/harajstation /etc/nginx/sites-enabled/harajstation
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then let certbot add TLS to this same block (it rewrites it in place and
# adds the :80 -> :443 redirect):
#   sudo certbot --nginx -d harajstation.com -d www.harajstation.com --redirect
#
# After certbot runs, enable HTTP/2 on the TLS listeners it added (it writes
# plain `listen 443 ssl;` lines — append `http2` to both):
#   listen [::]:443 ssl http2 ipv6only=on;
#   listen 443 ssl http2;

upstream harajstation_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Anonymous microcache ─────────────────────────────────────────────────────
# Public pages are identical for every signed-out visitor (language cookie
# aside), so nginx holds each one for 5 seconds and absorbs campaign spikes —
# the app renders a page once per 5s instead of once per visitor. Anyone with
# a session cookie bypasses the cache entirely, responses carrying Set-Cookie
# are never stored (nginx default), and /api is excluded below.
# Requires /var/cache/nginx to exist (mkdir -p, owned by www-data).
proxy_cache_path /var/cache/nginx/haraj levels=1:2 keys_zone=haraj:10m
                 max_size=256m inactive=10m use_temp_path=off;

map $http_cookie $haraj_skip_cache {
    default 0;
    ~samel_session 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name harajstation.com www.harajstation.com;

    # 10 images x 5MB per listing (src/lib/uploads.ts) + form overhead
    client_max_body_size 60m;

    # image uploads go through the app to R2 — don't cut them off early
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/rss+xml image/svg+xml font/woff2;

    # ── Client IP ────────────────────────────────────────────────────────────
    # THE RATE LIMITER DEPENDS ON THESE. Both are set to $remote_addr — the
    # real TCP peer — and never to a value the client sent us:
    #   * X-Forwarded-For is NOT $proxy_add_x_forwarded_for, because that
    #     appends to whatever the client claimed, and the app reads the first
    #     entry — an attacker would just send a fake one and get a fresh
    #     bucket on every request.
    #   * CF-Connecting-IP is cleared (an empty value means nginx drops the
    #     header entirely), because the app trusts it first and we are NOT
    #     behind Cloudflare. See the note at the bottom before enabling CF.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Connecting-IP  "";

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # immutable build assets — hashed filenames, safe to cache hard
    location /_next/static/ {
        proxy_pass http://harajstation_app;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API traffic: never cached, streamed straight through
    location /api/ {
        proxy_pass http://harajstation_app;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://harajstation_app;

        # 5s microcache for anonymous GETs (signed-in users always bypass).
        # Buffering must be on for nginx to cache; page renders are fast now
        # that the app caches its own data (src/lib/page-cache.ts), so the
        # streaming-first argument no longer outweighs spike absorption.
        proxy_cache haraj;
        proxy_cache_key "$scheme$host$request_uri|$cookie_samel_lang|$http_rsc$http_next_router_prefetch";
        proxy_cache_bypass $haraj_skip_cache;
        proxy_no_cache $haraj_skip_cache;
        proxy_cache_valid 200 5s;
        proxy_ignore_headers Cache-Control Expires;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_use_stale updating error timeout;
        add_header X-Cache-Status $upstream_cache_status;
    }
}

# ── Later, if you move DNS to Cloudflare ─────────────────────────────────────
# Cloudflare terminates TLS and sends the visitor's IP in CF-Connecting-IP,
# which the app already prefers. To use it safely you must (a) accept traffic
# ONLY from Cloudflare's IP ranges, so nobody can hit the origin directly and
# forge the header, and (b) replace the two lines above with:
#
#     proxy_set_header X-Real-IP        $http_cf_connecting_ip;
#     proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
#
# Until both are done, leave the header cleared as it is now.
