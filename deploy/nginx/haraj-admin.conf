# حراج ستيشن — بوابة الإدارة (haraj-ad.harajstation.com)
#
# Same app, same server: the Next.js proxy (src/proxy.ts) serves ONLY the
# admin portal on this hostname (ADMIN_HOST in .env) and 404s it everywhere
# else. This block just terminates the vhost — no microcache here, admin
# responses are always personal.
#
# Install:
#   sudo cp deploy/nginx/haraj-admin.conf /etc/nginx/sites-available/haraj-admin
#   sudo ln -sf /etc/nginx/sites-available/haraj-admin /etc/nginx/sites-enabled/haraj-admin
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d haraj-ad.harajstation.com --redirect
#
# Cloudflare: create the A record for haraj-ad → server IP. Keep it
# DNS-only (grey cloud) until certbot has issued the certificate, then
# proxying (orange cloud) is fine.

server {
    listen 80;
    listen [::]:80;
    server_name haraj-ad.harajstation.com;

    client_max_body_size 20m;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml font/woff2;

    # same client-IP rules as the main vhost — the rate limiter depends on it
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Connecting-IP  "";

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # never index the portal, whatever a crawler thinks
    add_header X-Robots-Tag "noindex, nofollow" always;

    location /_next/static/ {
        proxy_pass http://harajstation_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://harajstation_app;
        proxy_buffering off;
    }
}
